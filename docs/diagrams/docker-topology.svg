<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 650" width="100%" role="img">
  <title>Docker部署拓扑图</title>
  <desc>CCF ModelEngine Docker 部署拓扑：Nexent 11容器 + DataMate 6容器 + MCP宿主机进程</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="26" text-anchor="middle" fill="#26215C" font-size="15">CCF ModelEngine -- Docker 部署拓扑</text>

  <!-- WSL2 boundary -->
  <rect x="28" y="42" width="624" height="355" rx="14" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="8,4"/>
  <text class="ts" x="340" y="56" text-anchor="middle" fill="#888780" font-size="11">WSL2 Ubuntu (Docker Bridge Network)</text>

  <!-- Nexent Cluster -->
  <rect x="40" y="64" width="350" height="320" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="215" y="82" text-anchor="middle" fill="#085041" font-size="12">Nexent 集群 (11 容器)</text>

  <!-- Row 1 -->
  <rect x="50" y="90" width="78" height="30" rx="5" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="89" y="105" text-anchor="middle" fill="#085041" font-size="9">es:9210</text>

  <rect x="135" y="90" width="78" height="30" rx="5" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="174" y="105" text-anchor="middle" fill="#085041" font-size="9">pg:5434</text>

  <rect x="220" y="90" width="78" height="30" rx="5" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="259" y="105" text-anchor="middle" fill="#085041" font-size="9">redis:6379</text>

  <rect x="305" y="90" width="78" height="30" rx="5" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="344" y="105" text-anchor="middle" fill="#085041" font-size="9">minio:9010</text>

  <!-- Row 2 -->
  <rect x="50" y="128" width="98" height="30" rx="5" fill="#C0DD97" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="99" y="143" text-anchor="middle" fill="#085041" font-size="9">config:5010</text>

  <rect x="156" y="128" width="98" height="30" rx="5" fill="#C0DD97" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="205" y="143" text-anchor="middle" fill="#085041" font-size="9">runtime:5014</text>

  <rect x="262" y="128" width="98" height="30" rx="5" fill="#C0DD97" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="311" y="143" text-anchor="middle" fill="#085041" font-size="9">mcp:5011</text>

  <!-- Row 3 -->
  <rect x="50" y="166" width="98" height="30" rx="5" fill="#C0DD97" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="99" y="181" text-anchor="middle" fill="#085041" font-size="9">northbound:5013</text>

  <rect x="156" y="166" width="98" height="30" rx="5" fill="#C0DD97" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="205" y="181" text-anchor="middle" fill="#085041" font-size="9">web:3000</text>

  <rect x="262" y="166" width="98" height="30" rx="5" fill="#C0DD97" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="311" y="181" text-anchor="middle" fill="#085041" font-size="9">data-proc:5012</text>

  <!-- Row 4 -->
  <rect x="50" y="204" width="320" height="30" rx="5" fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.3"/>
  <text class="ts" x="210" y="219" text-anchor="middle" fill="#5F5E5A" font-size="9">openssh:2222 (Terminal, optional)</text>

  <!-- Nexent service descriptions -->
  <text class="ts" x="210" y="250" text-anchor="middle" fill="#0F6E56" font-size="10">基础设施: Elasticsearch · PostgreSQL · Redis · MinIO</text>
  <text class="ts" x="210" y="265" text-anchor="middle" fill="#0F6E56" font-size="10">业务服务: Config · Runtime · MCP · Northbound · Web · DataProcess</text>
  <text class="ts" x="210" y="280" text-anchor="middle" fill="#0F6E56" font-size="10">数据管道: Ray · Celery · Flower · 算子执行</text>

  <!-- DataMate Cluster -->
  <rect x="400" y="64" width="240" height="260" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="th" x="520" y="82" text-anchor="middle" fill="#0C447C" font-size="12">DataMate 集群 (6 容器)</text>

  <rect x="412" y="92" width="108" height="28" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
  <text class="ts" x="466" y="106" text-anchor="middle" fill="#0C447C" font-size="9">gateway:8080</text>

  <rect x="528" y="92" width="100" height="28" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
  <text class="ts" x="578" y="106" text-anchor="middle" fill="#0C447C" font-size="9">frontend:30000</text>

  <rect x="412" y="128" width="108" height="28" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
  <text class="ts" x="466" y="142" text-anchor="middle" fill="#0C447C" font-size="9">backend:8092</text>

  <rect x="528" y="128" width="100" height="28" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
  <text class="ts" x="578" y="142" text-anchor="middle" fill="#0C447C" font-size="9">backend-py:18000</text>

  <rect x="412" y="164" width="108" height="28" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
  <text class="ts" x="466" y="178" text-anchor="middle" fill="#0C447C" font-size="9">database:5432</text>

  <rect x="528" y="164" width="100" height="28" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
  <text class="ts" x="578" y="178" text-anchor="middle" fill="#0C447C" font-size="9">runtime (Ray)</text>

  <rect x="412" y="200" width="216" height="28" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
  <text class="ts" x="520" y="214" text-anchor="middle" fill="#0C447C" font-size="9">milvus:19530 (向量数据库)</text>

  <text class="ts" x="520" y="246" text-anchor="middle" fill="#185FA5" font-size="10">Java(Spring Boot)+Python(FastAPI)</text>
  <text class="ts" x="520" y="261" text-anchor="middle" fill="#185FA5" font-size="10">算子上传(ZIP)·算子执行(Ray)</text>
  <text class="ts" x="520" y="276" text-anchor="middle" fill="#185FA5" font-size="10">数据标注·RAG知识库</text>

  <!-- Arrow between Nexent and DataMate -->
  <line x1="390" y1="200" x2="400" y2="200" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="385" y="194" text-anchor="middle" fill="#888780" font-size="9">API</text>

  <!-- MCP Server (host process) -->
  <rect x="120" y="408" width="440" height="48" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="340" y="426" text-anchor="middle" fill="#633806" font-size="12">MCP Server (宿主机独立进程 - http://localhost:8089)</text>
  <text class="ts" x="340" y="442" text-anchor="middle" fill="#854F0B" font-size="10">Python 3.11 + FastMCP · SSE 协议 · 10+ 工具 · Docker socket (只读)</text>

  <!-- Mount points -->
  <rect x="120" y="468" width="440" height="55" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="340" y="486" text-anchor="middle" fill="#444441" font-size="11">宿主机挂载点</text>
  <text class="ts" x="200" y="504" text-anchor="middle" fill="#5F5E5A" font-size="10">/mnt/nexent (Nexent 用户目录)</text>
  <text class="ts" x="440" y="504" text-anchor="middle" fill="#5F5E5A" font-size="10">/dataset (DataMate 数据卷)</text>

  <!-- Connection lines -->
  <line x1="180" y1="400" x2="180" y2="386" stroke="#BA7517" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="400" x2="500" y2="386" stroke="#BA7517" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow from MCP to Nexent -->
  <svg x="280" y="355" width="30" height="55">
    <line x1="15" y1="0" x2="15" y2="40" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  </svg>

  <!-- Arrow from MCP to DataMate -->
  <svg x="500" y="350" width="30" height="60">
    <line x1="15" y1="5" x2="15" y2="40" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  </svg>

  <!-- Port summary -->
  <rect x="40" y="538" width="600" height="32" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="340" y="554" text-anchor="middle" fill="#3C3489" font-size="11">关键端口: Nexent Web(3000) · Gateway(8080) · DataMate Front(30000) · MCP(8089)</text>

  <!-- Legend -->
  <g>
    <rect x="100" y="584" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="118" y="593" fill="#5F5E5A" font-size="10">Nexent</text>
    <rect x="190" y="584" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="ts" x="208" y="593" fill="#5F5E5A" font-size="10">DataMate</text>
    <rect x="290" y="584" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="308" y="593" fill="#5F5E5A" font-size="10">MCP Server</text>
    <rect x="400" y="584" width="12" height="12" rx="3" fill="none" stroke="#888780" stroke-dasharray="4,2"/>
    <text class="ts" x="418" y="593" fill="#5F5E5A" font-size="10">WSL2 边界</text>
  </g>

  <text class="ts" x="340" y="615" text-anchor="middle" fill="#5F5E5A" font-size="10">启动命令: cd docker && docker compose -f nexent-docker-compose.yml up -d && docker compose -f datamate-docker-compose.yml up -d</text>
  <text class="ts" x="340" y="632" text-anchor="middle" fill="#5F5E5A" font-size="10">MCP启动: cd mcp_server && python server.py</text>
</svg>
