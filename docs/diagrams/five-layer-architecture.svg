      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="28" text-anchor="middle" fill="#26215C" font-size="15">CCF ModelEngine -- 五层分层技术架构</text>

