  <rect x="40" y="42" width="600" height="110" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="60" y="60" fill="#3C3489" font-size="13">Layer 4: 应用展示层</text>

  <g>
