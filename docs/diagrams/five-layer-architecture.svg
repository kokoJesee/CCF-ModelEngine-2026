<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 750" width="100%" role="img">
  <title>五层分层技术架构图</title>
  <desc>CCF ModelEngine 五层技术架构：基础设施→算子执行→协议桥梁→智能体编排→应用展示</desc>
  <defs>
