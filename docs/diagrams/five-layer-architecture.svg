    <text class="ts" x="125" y="103" text-anchor="middle" fill="#534AB7" font-size="10">run_demo.py</text>
  </g>
  <g>
    <rect x="210" y="72" width="130" height="36" rx="6" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
