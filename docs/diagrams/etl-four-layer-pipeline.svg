<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="100%" role="img">
  <title>ETL四层流水线架构图</title>
  <desc>任务一ETL数据处理：四层架构 + 三级异常策略 + 报告聚合</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#639922" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="26" text-anchor="middle" fill="#26215C" font-size="15">Task 1: ETL 数据处理 -- 四层架构流水线</text>

  <!-- Layer 1: Config -->
  <rect x="40" y="44" width="600" height="60" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="60" y="62" fill="#3C3489" font-size="12">Layer 1: 入口配置层</text>
  <rect x="60" y="70" width="175" height="24" rx="5" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="147" y="82" text-anchor="middle" fill="#3C3489" font-size="10">main() 入口函数</text>
  <rect x="250" y="70" width="175" height="24" rx="5" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="337" y="82" text-anchor="middle" fill="#3C3489" font-size="10">CONFIG 配置字典</text>
  <rect x="440" y="70" width="185" height="24" rx="5" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="ts" x="532" y="82" text-anchor="middle" fill="#3C3489" font-size="10">参数解析/验证</text>

  <line x1="340" y1="104" x2="340" y2="124" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Pipeline Engine -->
  <rect x="40" y="128" width="600" height="95" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="th" x="60" y="146" fill="#0C447C" font-size="12">Layer 2: 流水线引擎层</text>

  <g>
    <rect x="60" y="156" width="115" height="30" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="117" y="171" text-anchor="middle" fill="#0C447C" font-size="10">Step 1: 数据加载</text>
  </g>
  <text x="183" y="171" fill="#888780" font-size="12" dominant-baseline="central">→</text>
  <g>
    <rect x="196" y="156" width="115" height="30" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="253" y="171" text-anchor="middle" fill="#0C447C" font-size="10">Step 2: 数据清洗</text>
  </g>
  <text x="319" y="171" fill="#888780" font-size="12" dominant-baseline="central">→</text>
  <g>
    <rect x="332" y="156" width="115" height="30" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="389" y="171" text-anchor="middle" fill="#0C447C" font-size="10">Step 3: 数据转换</text>
  </g>
  <text x="455" y="171" fill="#888780" font-size="12" dominant-baseline="central">→</text>
  <g>
    <rect x="468" y="156" width="115" height="30" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="525" y="171" text-anchor="middle" fill="#0C447C" font-size="10">Step 4: 数据导出</text>
  </g>

  <text class="ts" x="340" y="202" text-anchor="middle" fill="#185FA5" font-size="10">run_pipeline() · 四步编排 · 进度跟踪 · 耗时统计 · 三级异常处理</text>

  <line x1="340" y1="223" x2="340" y2="243" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Layer 3: Operator Instance -->
  <rect x="40" y="246" width="600" height="105" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="60" y="264" fill="#085041" font-size="12">Layer 3: 算子实例层</text>

  <g>
    <rect x="60" y="274" width="120" height="44" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="th" x="120" y="290" text-anchor="middle" fill="#085041" font-size="10">DataLoader v2.2.0</text>
    <text class="ts" x="120" y="306" text-anchor="middle" fill="#0F6E56" font-size="9">自动检测格式/编码</text>
  </g>
  <g>
    <rect x="196" y="274" width="120" height="44" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="th" x="256" y="290" text-anchor="middle" fill="#085041" font-size="10">DataCleaner v1.0.0</text>
    <text class="ts" x="256" y="306" text-anchor="middle" fill="#0F6E56" font-size="9">去重 脱敏 去空值</text>
  </g>
  <g>
    <rect x="332" y="274" width="120" height="44" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="th" x="392" y="290" text-anchor="middle" fill="#085041" font-size="10">Transformer v1.0.0</text>
    <text class="ts" x="392" y="306" text-anchor="middle" fill="#0F6E56" font-size="9">类型标准化/派生列</text>
  </g>
  <g>
    <rect x="468" y="274" width="155" height="44" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="th" x="545" y="290" text-anchor="middle" fill="#085041" font-size="10">DataExporter v1.0.0</text>
    <text class="ts" x="545" y="306" text-anchor="middle" fill="#0F6E56" font-size="9">输出CSV+JSON报告</text>
  </g>

  <!-- Data flow labels -->
  <text class="ts" x="120" y="330" text-anchor="middle" fill="#0F6E56" font-size="9">31 rows</text>
  <text class="ts" x="256" y="330" text-anchor="middle" fill="#0F6E56" font-size="9">25 rows (-6)</text>
  <text class="ts" x="392" y="330" text-anchor="middle" fill="#0F6E56" font-size="9">25 rows (+BMI)</text>
  <text class="ts" x="545" y="330" text-anchor="middle" fill="#0F6E56" font-size="9">CSV 输出</text>

  <line x1="340" y1="351" x2="340" y2="371" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Layer 4: Support -->
  <rect x="40" y="374" width="600" height="100" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="th" x="60" y="392" fill="#633806" font-size="12">Layer 4: 支撑模块层</text>

  <g>
    <rect x="60" y="402" width="175" height="40" rx="6" fill="#FAC775" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="147" y="416" text-anchor="middle" fill="#633806" font-size="10">三级异常处理策略</text>
    <text class="ts" x="147" y="432" text-anchor="middle" fill="#854F0B" font-size="9">Validation→Processing→Warning</text>
  </g>
  <g>
    <rect x="250" y="402" width="175" height="40" rx="6" fill="#FAC775" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="337" y="416" text-anchor="middle" fill="#633806" font-size="10">进度跟踪</text>
    <text class="ts" x="337" y="432" text-anchor="middle" fill="#854F0B" font-size="9">Step N/4 实时反馈</text>
  </g>
  <g>
    <rect x="440" y="402" width="185" height="40" rx="6" fill="#FAC775" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="th" x="532" y="416" text-anchor="middle" fill="#633806" font-size="10">报告聚合</text>
    <text class="ts" x="532" y="432" text-anchor="middle" fill="#854F0B" font-size="9">step_reports→汇总JSON</text>
  </g>

  <text class="ts" x="340" y="462" text-anchor="middle" fill="#854F0B" font-size="10">ValidationError(即时失败) · ProcessingError(中断记录) · 可恢复异常(warning继续)</text>

  <!-- Exception strategy details -->
  <rect x="40" y="482" width="600" height="80" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text class="th" x="340" y="500" text-anchor="middle" fill="#791F1F" font-size="12">三级异常策略细节</text>

  <g>
    <rect x="60" y="512" width="175" height="36" rx="5" fill="#F7C1C1" stroke="#F09595" stroke-width="0.5"/>
    <text class="th" x="147" y="526" text-anchor="middle" fill="#A32D2D" font-size="10">ValidationError (1级)</text>
    <text class="ts" x="147" y="540" text-anchor="middle" fill="#791F1F" font-size="9">即时失败·停止流水线</text>
  </g>
  <g>
    <rect x="252" y="512" width="175" height="36" rx="5" fill="#F7C1C1" stroke="#F09595" stroke-width="0.5"/>
    <text class="th" x="339" y="526" text-anchor="middle" fill="#A32D2D" font-size="10">ProcessingError (2级)</text>
    <text class="ts" x="339" y="540" text-anchor="middle" fill="#791F1F" font-size="9">中断当前步·记录日志</text>
  </g>
  <g>
    <rect x="445" y="512" width="175" height="36" rx="5" fill="#F7C1C1" stroke="#F09595" stroke-width="0.5"/>
    <text class="th" x="532" y="526" text-anchor="middle" fill="#A32D2D" font-size="10">Warning (3级)</text>
    <text class="ts" x="532" y="540" text-anchor="middle" fill="#791F1F" font-size="9">警告·继续执行·汇总</text>
  </g>

  <!-- Output summary -->
  <rect x="120" y="574" width="440" height="36" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text class="ts" x="340" y="590" text-anchor="middle" fill="#3B6D11" font-size="11">输出: medical_data_cleaned.csv (25行) + pipeline_report.json (汇总报告)</text>

  <!-- Performance note -->
  <text class="ts" x="340" y="620" text-anchor="middle" fill="#5F5E5A" font-size="10">本地测试总耗时: 45.60ms (加载23% + 清洗40% + 转换22% + 导出14%)</text>

  <!-- Legend -->
  <g>
    <rect x="200" y="636" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="ts" x="218" y="645" fill="#5F5E5A" font-size="10">配置层</text>
    <rect x="285" y="636" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="ts" x="303" y="645" fill="#5F5E5A" font-size="10">引擎层</text>
    <rect x="370" y="636" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="388" y="645" fill="#5F5E5A" font-size="10">实例层</text>
    <rect x="455" y="636" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="473" y="645" fill="#5F5E5A" font-size="10">支撑层</text>
  </g>
</svg>
