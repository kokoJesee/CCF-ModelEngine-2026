<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="100%" role="img">
  <title>三任务全景闭环图</title>
  <desc>CCF ModelEngine 数据→知识→洞察三任务全景架构</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-dasharray="4,2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="28" text-anchor="middle" fill="#26215C" font-size="15">CCF ModelEngine -- 三任务全景闭环架构</text>

  <!-- Score labels -->
  <text class="ts" x="145" y="52" text-anchor="middle" fill="#534AB7" font-size="12">Task 1 (30 pts)</text>
  <text class="ts" x="340" y="52" text-anchor="middle" fill="#0F6E56" font-size="12">Task 2 (40 pts)</text>
  <text class="ts" x="535" y="52" text-anchor="middle" fill="#993C1D" font-size="12">Task 3 (30 pts)</text>

  <!-- === TASK 1: ETL === -->
  <g class="c-purple">
    <rect x="40" y="65" width="210" height="42" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="145" y="86" text-anchor="middle" fill="#26215C" font-size="13">Task 1: 数据处理智能体</text>
  </g>

  <!-- Task 1 sub boxes -->
  <g>
    <rect x="40" y="115" width="96" height="36" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="ts" x="88" y="133" text-anchor="middle" fill="#3C3489" font-size="11">DataLoader</text>
  </g>
  <text x="142" y="133" fill="#888780" font-size="11" dominant-baseline="central">→</text>
  <g>
    <rect x="154" y="115" width="96" height="36" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="ts" x="202" y="133" text-anchor="middle" fill="#3C3489" font-size="11">DataCleaner</text>
  </g>
  <text x="222" y="170" fill="#888780" font-size="11" font-family="monospace" text-anchor="middle">↓</text>
  <g>
    <rect x="40" y="180" width="96" height="36" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="ts" x="88" y="198" text-anchor="middle" fill="#3C3489" font-size="11">Transformer</text>
  </g>
  <text x="142" y="198" fill="#888780" font-size="11" dominant-baseline="central">→</text>
  <g>
    <rect x="154" y="180" width="96" height="36" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="ts" x="202" y="198" text-anchor="middle" fill="#3C3489" font-size="11">DataExporter</text>
  </g>

  <!-- Task 1 output -->
  <g class="c-blue">
    <rect x="55" y="230" width="180" height="30" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="ts" x="145" y="245" text-anchor="middle" fill="#0C447C" font-size="11">输出: 结构化医疗数据 (31→25行)</text>
  </g>

  <!-- Arrow T1 → T2 -->
  <line x1="155" y1="260" x2="280" y2="340" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- === TASK 2: KG === -->
  <g class="c-teal">
    <rect x="280" y="300" width="120" height="42" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="340" y="321" text-anchor="middle" fill="#085041" font-size="13">Task 2: KG 问答</text>
  </g>

  <!-- Task 2 sub boxes - vertical -->
  <g>
    <rect x="280" y="352" width="120" height="32" rx="6" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
    <text class="ts" x="340" y="368" text-anchor="middle" fill="#085041" font-size="11">实体识别</text>
  </g>
  <text x="340" y="398" fill="#888780" font-size="11" font-family="monospace" text-anchor="middle">↓</text>
  <g>
    <rect x="280" y="408" width="120" height="32" rx="6" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
    <text class="ts" x="340" y="424" text-anchor="middle" fill="#085041" font-size="11">关系抽取</text>
  </g>
  <text x="340" y="454" fill="#888780" font-size="11" font-family="monospace" text-anchor="middle">↓</text>
  <g>
    <rect x="280" y="464" width="120" height="32" rx="6" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="0.5"/>
    <text class="ts" x="340" y="480" text-anchor="middle" fill="#085041" font-size="11">三元组生成</text>
  </g>

  <!-- Task 2 output -->
  <g class="c-green">
    <rect x="280" y="508" width="120" height="30" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text class="ts" x="340" y="523" text-anchor="middle" fill="#27500A" font-size="11">输出: 200+ 三元组</text>
  </g>

  <!-- Arrow T2 → T3 -->
  <line x1="410" y1="415" x2="480" y2="370" stroke="#F0997B" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- === TASK 3: Analysis === -->
  <g class="c-coral">
    <rect x="470" y="300" width="180" height="42" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="560" y="321" text-anchor="middle" fill="#4A1B0C" font-size="13">Task 3: 数据分析与可视化</text>
  </g>

  <!-- Task 3 sub boxes -->
  <g>
    <rect x="470" y="352" width="80" height="32" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
    <text class="ts" x="510" y="368" text-anchor="middle" fill="#712B13" font-size="11">kg_analyze</text>
  </g>
  <text x="555" y="368" fill="#888780" font-size="11" dominant-baseline="central">→</text>
  <g>
    <rect x="568" y="352" width="82" height="32" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
    <text class="ts" x="609" y="368" text-anchor="middle" fill="#712B13" font-size="11">kg_visualize</text>
  </g>

  <g>
    <rect x="470" y="396" width="82" height="32" rx="6" fill="#FAECE7" stroke="#F5C4B3" stroke-width="0.5"/>
    <text class="ts" x="511" y="412" text-anchor="middle" fill="#712B13" font-size="11">kg_report</text>
  </g>
  <text x="555" y="412" fill="#888780" font-size="11" dominant-baseline="central">+</text>
  <g class="c-amber">
    <rect x="568" y="396" width="82" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="609" y="412" text-anchor="middle" fill="#633806" font-size="11">洞察引擎</text>
  </g>

  <!-- Task 3 outputs -->
  <g>
    <rect x="470" y="442" width="50" height="24" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="495" y="454" text-anchor="middle" fill="#444441" font-size="10">图表</text>
  </g>
  <g>
    <rect x="530" y="442" width="55" height="24" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="557" y="454" text-anchor="middle" fill="#444441" font-size="10">报告</text>
  </g>
  <g>
    <rect x="595" y="442" width="55" height="24" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="622" y="454" text-anchor="middle" fill="#444441" font-size="10">洞察</text>
  </g>

  <!-- === PLATFORM LAYER === -->
  <g class="c-gray">
    <rect x="40" y="558" width="600" height="40" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="340" y="578" text-anchor="middle" fill="#2C2C2A" font-size="13">Nexent 智能体平台 (3 Agents · deepseek-v4-flash)</text>
  </g>

  <g class="c-gray">
    <rect x="40" y="602" width="600" height="34" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="ts" x="340" y="619" text-anchor="middle" fill="#5F5E5A" font-size="12">MCP 协议桥梁 (FastMCP · 10+ Tools · http://host.docker.internal:8089)</text>
  </g>

  <g class="c-gray">
    <rect x="40" y="640" width="600" height="34" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="ts" x="340" y="657" text-anchor="middle" fill="#5F5E5A" font-size="12">DataMate 算子执行平台 (7 Operators · Ray 分布式 · Docker Compose)</text>
  </g>

  <!-- Vertical arrows from platform layers to tasks -->
  <line x1="145" y1="598" x2="145" y2="340" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,6"/>
  <line x1="340" y1="598" x2="340" y2="543" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,6"/>
  <line x1="560" y1="598" x2="560" y2="470" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3,6"/>
</svg>
