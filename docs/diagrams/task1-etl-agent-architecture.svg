<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" width="100%" role="img">
  <title>Task 1 数据处理智能体架构</title>
  <desc>任务一ETL数据处理智能体：单Agent Pipeline模式，7个工具，两种执行路径</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="26" text-anchor="middle" fill="#26215C" font-size="15">Task 1: 数据处理智能体 -- 单 Agent Pipeline 架构</text>

  <!-- User -->
  <g class="c-gray">
    <rect x="240" y="42" width="200" height="32" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="340" y="58" text-anchor="middle" fill="#444441" font-size="12">用户请求: 处理医疗数据</text>
  </g>
  <line x1="340" y1="74" x2="340" y2="92" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Agent -->
  <g class="c-purple">
    <rect x="120" y="96" width="440" height="64" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="340" y="116" text-anchor="middle" fill="#26215C" font-size="13">Nexent Agent: data_processing_agent</text>
    <text class="ts" x="340" y="134" text-anchor="middle" fill="#534AB7" font-size="11">deepseek-v4-flash · max_steps=15 · Pipeline模式 · 单Agent无子Agent</text>
    <text class="ts" x="340" y="150" text-anchor="middle" fill="#534AB7" font-size="10">duty_prompt: ETL专业智能体 · constraint: 工具调用格式/参数规范/错误处理</text>
  </g>

  <!-- Tools split -->
  <line x1="200" y1="160" x2="200" y2="180" stroke="#534AB7" stroke-width="1"/>
  <line x1="480" y1="160" x2="480" y2="180" stroke="#534AB7" stroke-width="1"/>

  <!-- File system tools -->
  <g class="c-blue">
    <rect x="40" y="184" width="280" height="100" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="180" y="202" text-anchor="middle" fill="#0C447C" font-size="12">文件系统工具 (内置)</text>

    <rect x="55" y="212" width="120" height="26" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
    <text class="ts" x="115" y="225" text-anchor="middle" fill="#0C447C" font-size="10">read_file</text>

    <rect x="185" y="212" width="120" height="26" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
    <text class="ts" x="245" y="225" text-anchor="middle" fill="#0C447C" font-size="10">create_file</text>

    <rect x="55" y="246" width="120" height="26" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
    <text class="ts" x="115" y="259" text-anchor="middle" fill="#0C447C" font-size="10">list_directory</text>

    <rect x="185" y="246" width="120" height="26" rx="5" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.3"/>
    <text class="ts" x="245" y="259" text-anchor="middle" fill="#0C447C" font-size="10">move/delete</text>
  </g>

  <!-- MCP tools -->
  <g class="c-amber">
    <rect x="360" y="184" width="280" height="100" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="500" y="202" text-anchor="middle" fill="#633806" font-size="12">MCP 工具 (DataMate)</text>

    <rect x="375" y="212" width="120" height="26" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="435" y="225" text-anchor="middle" fill="#633806" font-size="10">verify_connection</text>

    <rect x="505" y="212" width="120" height="26" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="565" y="225" text-anchor="middle" fill="#633806" font-size="10">list_operators</text>

    <rect x="375" y="246" width="120" height="26" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="435" y="259" text-anchor="middle" fill="#633806" font-size="10">execute_operator</text>

    <rect x="505" y="246" width="120" height="26" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="565" y="259" text-anchor="middle" fill="#633806" font-size="10">run_etl_pipeline</text>
  </g>

  <!-- Two execution paths -->
  <text class="th" x="340" y="306" text-anchor="middle" fill="#444441" font-size="12">两种执行路径</text>

  <!-- Path A: One-click -->
  <g class="c-green">
    <rect x="40" y="316" width="290" height="44" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text class="th" x="185" y="334" text-anchor="middle" fill="#27500A" font-size="11">路径A: 一键ETL (推荐)</text>
    <text class="ts" x="185" y="350" text-anchor="middle" fill="#3B6D11" font-size="10">run_etl_pipeline 一次调用完成4步</text>
  </g>

  <!-- Path B: Step-by-step -->
  <g class="c-coral">
    <rect x="350" y="316" width="290" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="495" y="334" text-anchor="middle" fill="#4A1B0C" font-size="11">路径B: 分步执行</text>
    <text class="ts" x="495" y="350" text-anchor="middle" fill="#993C1D" font-size="10">execute_operator × 4 逐步调用</text>
  </g>

  <!-- ETL Pipeline -->
  <line x1="185" y1="360" x2="185" y2="378" stroke="#639922" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="495" y1="360" x2="495" y2="378" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="40" y="382" width="600" height="76" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="340" y="400" text-anchor="middle" fill="#085041" font-size="12">ETL 四步流水线 (DataMate 算子)</text>

    <rect x="55" y="410" width="130" height="36" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
    <text class="ts" x="120" y="424" text-anchor="middle" fill="#085041" font-size="10">DataLoader v2.2.0</text>
    <text class="ts" x="120" y="438" text-anchor="middle" fill="#0F6E56" font-size="9">格式检测/编码</text>

    <text x="195" y="428" fill="#888780" font-size="12" dominant-baseline="central">→</text>

    <rect x="210" y="410" width="130" height="36" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
    <text class="ts" x="275" y="424" text-anchor="middle" fill="#085041" font-size="10">DataCleaner v1.0.0</text>
    <text class="ts" x="275" y="438" text-anchor="middle" fill="#0F6E56" font-size="9">去重/脱敏/去空值</text>

    <text x="350" y="428" fill="#888780" font-size="12" dominant-baseline="central">→</text>

    <rect x="365" y="410" width="130" height="36" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
    <text class="ts" x="430" y="424" text-anchor="middle" fill="#085041" font-size="10">Transformer v1.0.0</text>
    <text class="ts" x="430" y="438" text-anchor="middle" fill="#0F6E56" font-size="9">类型标准化/BMI</text>

    <text x="505" y="428" fill="#888780" font-size="12" dominant-baseline="central">→</text>

    <rect x="520" y="410" width="105" height="36" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
    <text class="ts" x="572" y="424" text-anchor="middle" fill="#085041" font-size="10">Exporter v1.0.0</text>
    <text class="ts" x="572" y="438" text-anchor="middle" fill="#0F6E56" font-size="9">CSV+JSON输出</text>
  </g>

  <!-- Data flow -->
  <text class="ts" x="120" y="476" text-anchor="middle" fill="#0F6E56" font-size="10">31 rows</text>
  <text class="ts" x="275" y="476" text-anchor="middle" fill="#0F6E56" font-size="10">25 rows (-6 dup)</text>
  <text class="ts" x="430" y="476" text-anchor="middle" fill="#0F6E56" font-size="10">25 rows (+BMI)</text>
  <text class="ts" x="572" y="476" text-anchor="middle" fill="#0F6E56" font-size="10">CSV + report.json</text>

  <!-- Exception strategy -->
  <g class="c-red">
    <rect x="40" y="490" width="600" height="36" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
    <text class="ts" x="340" y="508" text-anchor="middle" fill="#791F1F" font-size="11">三级异常策略: ValidationError(即时失败) → ProcessingError(中断记录) → Warning(继续执行)</text>
  </g>

  <!-- Output -->
  <g class="c-gray">
    <rect x="120" y="538" width="440" height="32" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="340" y="554" text-anchor="middle" fill="#444441" font-size="11">输出: medical_data_cleaned.csv + pipeline_report.json (含行数/警告/耗时)</text>
  </g>

  <!-- Performance -->
  <text class="ts" x="340" y="588" text-anchor="middle" fill="#5F5E5A" font-size="10">本地测试: 45.60ms (加载23% + 清洗40% + 转换22% + 导出14%) · 148个测试用例 100%通过</text>

  <!-- Legend -->
  <g>
    <rect x="120" y="602" width="12" height="10" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="ts" x="138" y="610" fill="#5F5E5A" font-size="10">Agent</text>
    <rect x="195" y="602" width="12" height="10" rx="3" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="ts" x="213" y="610" fill="#5F5E5A" font-size="10">文件工具</text>
    <rect x="285" y="602" width="12" height="10" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="303" y="610" fill="#5F5E5A" font-size="10">MCP工具</text>
    <rect x="375" y="602" width="12" height="10" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="393" y="610" fill="#5F5E5A" font-size="10">算子</text>
    <rect x="445" y="602" width="12" height="10" rx="3" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text class="ts" x="463" y="610" fill="#5F5E5A" font-size="10">路径A</text>
    <rect x="510" y="602" width="12" height="10" rx="3" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="ts" x="528" y="610" fill="#5F5E5A" font-size="10">路径B</text>
  </g>
</svg>
