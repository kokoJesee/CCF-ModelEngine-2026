<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 780" width="100%" role="img">
  <title>Task 3 数据分析可视化智能体架构</title>
  <desc>任务三分析可视化：单Agent 4条路径 + 3工具链 + 8条洞察规则引擎</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="26" text-anchor="middle" fill="#4A1B0C" font-size="15">Task 3: 数据分析可视化智能体 v1.0 -- 4 路径 + 洞察引擎</text>

  <!-- User -->
  <g class="c-gray">
    <rect x="180" y="42" width="320" height="30" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="340" y="57" text-anchor="middle" fill="#444441" font-size="11">用户分析需求 (症状统计/药物分析/关系概览/对比)</text>
  </g>
  <line x1="340" y1="72" x2="340" y2="88" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Agent -->
  <g class="c-coral">
    <rect x="80" y="92" width="520" height="52" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="340" y="110" text-anchor="middle" fill="#4A1B0C" font-size="13">Nexent Agent: task3_analysis_agent v1.0 (单体智能体)</text>
    <text class="ts" x="340" y="128" text-anchor="middle" fill="#993C1D" font-size="10">deepseek-v4-flash · max_steps=15 · 4条分析路径 · 自动选择最优路径</text>
  </g>
  <line x1="340" y1="144" x2="340" y2="158" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 4 Paths -->
  <text class="th" x="340" y="166" text-anchor="middle" fill="#444441" font-size="12">4 条分析路径 (Agent 根据用户意图自动选择)</text>

  <g class="c-blue">
    <rect x="40" y="174" width="145" height="54" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="112" y="190" text-anchor="middle" fill="#0C447C" font-size="10">路径A: 事实查询</text>
    <text class="ts" x="112" y="204" text-anchor="middle" fill="#185FA5" font-size="9">"XX有什么症状?"</text>
    <text class="ts" x="112" y="218" text-anchor="middle" fill="#185FA5" font-size="9">analyze→visualize→report</text>
  </g>

  <g class="c-teal">
    <rect x="195" y="174" width="145" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="267" y="190" text-anchor="middle" fill="#085041" font-size="10">路径B: 关系概览</text>
    <text class="ts" x="267" y="204" text-anchor="middle" fill="#0F6E56" font-size="9">"XX的全貌?"</text>
    <text class="ts" x="267" y="218" text-anchor="middle" fill="#0F6E56" font-size="9">多维度analyze+多图</text>
  </g>

  <g class="c-amber">
    <rect x="350" y="174" width="145" height="54" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="422" y="190" text-anchor="middle" fill="#633806" font-size="10">路径C: 用药分析</text>
    <text class="ts" x="422" y="204" text-anchor="middle" fill="#854F0B" font-size="9">"XX用什么药?"</text>
    <text class="ts" x="422" y="218" text-anchor="middle" fill="#854F0B" font-size="9">药物统计+安全链</text>
  </g>

  <g class="c-purple">
    <rect x="505" y="174" width="135" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="572" y="190" text-anchor="middle" fill="#26215C" font-size="10">路径D: 对比分析</text>
    <text class="ts" x="572" y="204" text-anchor="middle" fill="#534AB7" font-size="9">"A和B区别?"</text>
    <text class="ts" x="572" y="218" text-anchor="middle" fill="#534AB7" font-size="9">多实体多图表</text>
  </g>

  <!-- Tool chain -->
  <line x1="112" y1="228" x2="112" y2="244" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="267" y1="228" x2="267" y2="244" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="422" y1="228" x2="422" y2="244" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="572" y1="228" x2="572" y2="244" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <text class="th" x="340" y="252" text-anchor="middle" fill="#444441" font-size="12">3 个 MCP 工具链</text>

  <!-- kg_analyze -->
  <g class="c-coral">
    <rect x="40" y="260" width="190" height="74" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="135" y="278" text-anchor="middle" fill="#4A1B0C" font-size="12">kg_analyze</text>
    <text class="ts" x="135" y="294" text-anchor="middle" fill="#993C1D" font-size="9">图谱统计分析</text>
    <rect x="55" y="302" width="75" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="92" y="314" text-anchor="middle" fill="#712B13" font-size="8">关系分布</text>
    <rect x="140" y="302" width="75" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="177" y="314" text-anchor="middle" fill="#712B13" font-size="8">症状分布</text>
  </g>

  <text x="240" y="297" fill="#888780" font-size="14" dominant-baseline="central">→</text>

  <!-- kg_visualize -->
  <g class="c-coral">
    <rect x="255" y="260" width="170" height="74" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="340" y="278" text-anchor="middle" fill="#4A1B0C" font-size="12">kg_visualize</text>
    <text class="ts" x="340" y="294" text-anchor="middle" fill="#993C1D" font-size="9">ECharts HTML图表</text>
    <rect x="268" y="302" width="36" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="286" y="314" text-anchor="middle" fill="#712B13" font-size="8">bar</text>
    <rect x="310" y="302" width="36" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="328" y="314" text-anchor="middle" fill="#712B13" font-size="8">pie</text>
    <rect x="352" y="302" width="36" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="370" y="314" text-anchor="middle" fill="#712B13" font-size="8">graph</text>
    <rect x="394" y="302" width="36" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="412" y="314" text-anchor="middle" fill="#712B13" font-size="8">line</text>
  </g>

  <text x="435" y="297" fill="#888780" font-size="14" dominant-baseline="central">→</text>

  <!-- kg_report -->
  <g class="c-coral">
    <rect x="450" y="260" width="190" height="74" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="545" y="278" text-anchor="middle" fill="#4A1B0C" font-size="12">kg_report</text>
    <text class="ts" x="545" y="294" text-anchor="middle" fill="#993C1D" font-size="9">结构化Markdown报告</text>
    <rect x="465" y="302" width="55" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="492" y="314" text-anchor="middle" fill="#712B13" font-size="8">full</text>
    <rect x="528" y="302" width="55" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="555" y="314" text-anchor="middle" fill="#712B13" font-size="8">summary</text>
    <rect x="591" y="302" width="40" height="22" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="611" y="314" text-anchor="middle" fill="#712B13" font-size="8">tech</text>
  </g>

  <!-- Insight Engine (integrated B) -->
  <line x1="545" y1="334" x2="545" y2="350" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>

  <g class="c-amber">
    <rect x="40" y="354" width="600" height="200" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="340" y="372" text-anchor="middle" fill="#633806" font-size="13">洞察规则引擎 (8 条规则 + 冲突消解 + 置信度评分)</text>

    <!-- Rules row 1 -->
    <rect x="55" y="382" width="135" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="122" y="396" text-anchor="middle" fill="#633806" font-size="9">Rule 1: 最多关系对</text>
    <text class="ts" x="122" y="410" text-anchor="middle" fill="#854F0B" font-size="8">频次统计 (↔Rule2互斥)</text>

    <rect x="200" y="382" width="135" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="267" y="396" text-anchor="middle" fill="#633806" font-size="9">Rule 2: 最少关系对</text>
    <text class="ts" x="267" y="410" text-anchor="middle" fill="#854F0B" font-size="8">频次统计 (↔Rule1互斥)</text>

    <rect x="345" y="382" width="135" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="412" y="396" text-anchor="middle" fill="#633806" font-size="9">Rule 3: 症状TOP</text>
    <text class="ts" x="412" y="410" text-anchor="middle" fill="#854F0B" font-size="8">高频统计 (↔Rule4)</text>

    <rect x="490" y="382" width="135" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="557" y="396" text-anchor="middle" fill="#633806" font-size="9">Rule 4: 症状BOTTOM</text>
    <text class="ts" x="557" y="410" text-anchor="middle" fill="#854F0B" font-size="8">低频统计</text>

    <!-- Rules row 2 -->
    <rect x="55" y="426" width="135" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="122" y="440" text-anchor="middle" fill="#633806" font-size="9">Rule 5: 多药预警</text>
    <text class="ts" x="122" y="454" text-anchor="middle" fill="#854F0B" font-size="8">交叉预警</text>

    <rect x="200" y="426" width="135" height="36" rx="5" fill="#F7C1C1" stroke="#E24B4A" stroke-width="0.3"/>
    <text class="ts" x="267" y="440" text-anchor="middle" fill="#A32D2D" font-size="9">Rule 6: 禁忌检测</text>
    <text class="ts" x="267" y="454" text-anchor="middle" fill="#791F1F" font-size="8">药物-疾病禁忌</text>

    <rect x="345" y="426" width="135" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="412" y="440" text-anchor="middle" fill="#633806" font-size="9">Rule 7: 药-症关联</text>
    <text class="ts" x="412" y="454" text-anchor="middle" fill="#854F0B" font-size="8">副作用分析</text>

    <rect x="490" y="426" width="135" height="36" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="557" y="440" text-anchor="middle" fill="#633806" font-size="9">Rule 8: 因果链</text>
    <text class="ts" x="557" y="454" text-anchor="middle" fill="#854F0B" font-size="8">跨分析推断</text>

    <!-- Conflict resolution -->
    <rect x="55" y="470" width="280" height="32" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="195" y="485" text-anchor="middle" fill="#633806" font-size="10">冲突消解: Rule1↔2 / Rule3↔4 互斥对自动选择</text>

    <rect x="345" y="470" width="280" height="32" rx="5" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="485" y="485" text-anchor="middle" fill="#633806" font-size="10">置信度: high(>80%) / medium(50-80%) / low(<50%)</text>

    <text class="ts" x="340" y="520" text-anchor="middle" fill="#854F0B" font-size="10">XSS防护: _escape_html() + _escape_js() · 白名单验证: 尺寸/主题/图表类型</text>
    <text class="ts" x="340" y="538" text-anchor="middle" fill="#854F0B" font-size="10">报告含可溯源引用 + 置信度评分 + 安全警告自动生成</text>
  </g>

  <!-- Outputs -->
  <line x1="340" y1="554" x2="340" y2="568" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>

  <text class="th" x="340" y="576" text-anchor="middle" fill="#444441" font-size="12">输出</text>

  <g>
    <rect x="80" y="586" width="150" height="36" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="155" y="604" text-anchor="middle" fill="#444441" font-size="10">HTML 图表</text>
    <text class="ts" x="155" y="616" text-anchor="middle" fill="#5F5E5A" font-size="9">ECharts CDN</text>
  </g>
  <g>
    <rect x="265" y="586" width="150" height="36" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="340" y="604" text-anchor="middle" fill="#444441" font-size="10">Markdown 报告</text>
    <text class="ts" x="340" y="616" text-anchor="middle" fill="#5F5E5A" font-size="9">洞察+置信度</text>
  </g>
  <g>
    <rect x="450" y="586" width="150" height="36" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="525" y="604" text-anchor="middle" fill="#444441" font-size="10">安全警告</text>
    <text class="ts" x="525" y="616" text-anchor="middle" fill="#5F5E5A" font-size="9">禁忌自动检测</text>
  </g>

  <!-- Test results -->
  <g class="c-green">
    <rect x="40" y="638" width="600" height="42" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
    <text class="ts" x="150" y="657" text-anchor="middle" fill="#3B6D11" font-size="10">analyze: 15/15</text>
    <text class="ts" x="290" y="657" text-anchor="middle" fill="#3B6D11" font-size="10">visualize: 46/46</text>
    <text class="ts" x="430" y="657" text-anchor="middle" fill="#3B6D11" font-size="10">report: 35/35</text>
    <text class="ts" x="550" y="657" text-anchor="middle" fill="#3B6D11" font-size="10">E2E: 44/44</text>
    <text class="ts" x="340" y="672" text-anchor="middle" fill="#27500A" font-size="10">总计 140/140 用例 100% 通过</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="100" y="696" width="12" height="10" rx="3" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="ts" x="118" y="704" fill="#5F5E5A" font-size="10">Agent/工具</text>
    <rect x="210" y="696" width="12" height="10" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="228" y="704" fill="#5F5E5A" font-size="10">洞察引擎</text>
    <rect x="320" y="696" width="12" height="10" rx="3" fill="#F7C1C1" stroke="#E24B4A" stroke-width="0.5"/>
    <text class="ts" x="338" y="704" fill="#5F5E5A" font-size="10">安全规则</text>
    <rect x="430" y="696" width="12" height="10" rx="3" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="ts" x="448" y="704" fill="#5F5E5A" font-size="10">路径A</text>
    <rect x="510" y="696" width="12" height="10" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="528" y="704" fill="#5F5E5A" font-size="10">路径B</text>
  </g>
</svg>
