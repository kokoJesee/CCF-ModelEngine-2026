<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720" width="100%" role="img">
  <title>任务二双代理问答架构图</title>
  <desc>任务二知识图谱问答智能体：双代理自验证架构，5步推理链</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="26" text-anchor="middle" fill="#085041" font-size="15">Task 2: 知识图谱问答智能体 (v3.0) -- 双代理自验证架构</text>

  <!-- User Input -->
  <g class="c-gray">
    <rect x="215" y="42" width="250" height="34" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text class="ts" x="340" y="59" text-anchor="middle" fill="#444441" font-size="12">用户自然语言提问</text>
  </g>
  <line x1="340" y1="76" x2="340" y2="100" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 1: Entity Recognition -->
  <g class="c-teal">
    <rect x="180" y="104" width="320" height="44" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="340" y="120" text-anchor="middle" fill="#085041" font-size="12">Step 1: 实体识别</text>
    <text class="ts" x="340" y="138" text-anchor="middle" fill="#0F6E56" font-size="10">kg_entity_recognizer · 100+医疗词典 · 首字哈希索引</text>
  </g>
  <line x1="340" y1="148" x2="340" y2="168" stroke="#088780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: Relation Extraction -->
  <g class="c-teal">
    <rect x="180" y="172" width="320" height="44" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="340" y="188" text-anchor="middle" fill="#085041" font-size="12">Step 2: 关系抽取</text>
    <text class="ts" x="340" y="206" text-anchor="middle" fill="#0F6E56" font-size="10">kg_relation_extractor · 触发词匹配+共现推理 (双通道)</text>
  </g>
  <line x1="340" y1="216" x2="340" y2="236" stroke="#088780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: Triple Generation -->
  <g class="c-teal">
    <rect x="180" y="240" width="320" height="44" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="340" y="256" text-anchor="middle" fill="#085041" font-size="12">Step 3: 三元组生成</text>
    <text class="ts" x="340" y="274" text-anchor="middle" fill="#0F6E56" font-size="10">kg_triple_generator · 两级冲突检测 (直接+禁忌)</text>
  </g>

  <!-- Branch line -->
  <line x1="340" y1="284" x2="340" y2="310" stroke="#088780" stroke-width="1"/>
  <line x1="90" y1="310" x2="590" y2="310" stroke="#088780" stroke-width="1"/>
  <line x1="90" y1="310" x2="90" y2="330" stroke="#088780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="590" y1="310" x2="590" y2="330" stroke="#088780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: Self Verify (left) -->
  <g class="c-amber">
    <rect x="30" y="334" width="240" height="60" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="150" y="352" text-anchor="middle" fill="#633806" font-size="12">Step 4: 自查验证</text>
    <text class="ts" x="150" y="368" text-anchor="middle" fill="#854F0B" font-size="10">基于真实工具结果逐项检查</text>
    <text class="ts" x="150" y="384" text-anchor="middle" fill="#854F0B" font-size="10">实体·关系·冲突·安全·标注</text>
  </g>

  <!-- Step 5: Answer (right) -->
  <g class="c-green">
    <rect x="410" y="334" width="240" height="60" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text class="th" x="530" y="352" text-anchor="middle" fill="#27500A" font-size="12">Step 5: 综合回答</text>
    <text class="ts" x="530" y="368" text-anchor="middle" fill="#3B6D11" font-size="10">结构化输出 + 来源标注</text>
    <text class="ts" x="530" y="384" text-anchor="middle" fill="#3B6D11" font-size="10">冲突解释 + 低置信度标注</text>
  </g>

  <!-- Revision loop arrow -->
  <line x1="150" y1="394" x2="150" y2="420" stroke="#BA7517" stroke-width="1"/>
  <line x1="150" y1="420" x2="530" y2="420" stroke="#BA7517" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="530" y1="420" x2="530" y2="394" stroke="#BA7517" stroke-width="1"/>
  <text x="340" y="414" text-anchor="middle" fill="#BA7517" font-size="10">修正循环 (最多2轮)</text>

  <!-- KG Schema box -->
  <g class="c-blue">
    <rect x="30" y="440" width="620" height="90" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="458" text-anchor="middle" fill="#0C447C" font-size="12">医疗知识图谱 Schema</text>

    <rect x="50" y="468" width="100" height="28" rx="6" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="100" y="483" text-anchor="middle" fill="#0C447C" font-size="11">disease (疾病)</text>

    <rect x="165" y="468" width="100" height="28" rx="6" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="215" y="483" text-anchor="middle" fill="#0C447C" font-size="11">symptom (症状)</text>

    <rect x="280" y="468" width="100" height="28" rx="6" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="330" y="483" text-anchor="middle" fill="#0C447C" font-size="11">drug (药物)</text>

    <rect x="395" y="468" width="100" height="28" rx="6" fill="#B5D4F4" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="ts" x="445" y="483" text-anchor="middle" fill="#0C447C" font-size="11">treatment (治疗)</text>

    <rect x="510" y="468" width="125" height="28" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
    <text class="ts" x="572" y="483" text-anchor="middle" fill="#791F1F" font-size="11">contra (禁忌)</text>

    <text class="ts" x="340" y="518" text-anchor="middle" fill="#185FA5" font-size="10">4 实体类型 + 4 关系类型 (has_symptom / treat / cause / contra) · 上下文约束规则</text>
  </g>

  <!-- Triple example -->
  <g class="c-gray">
    <rect x="30" y="542" width="620" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="340" y="557" text-anchor="middle" fill="#444441" font-size="11">示例: [阿司匹林] drugs -- cause --> [胃肠道出血] symptoms</text>
    <text class="ts" x="340" y="574" text-anchor="middle" fill="#5F5E5A" font-size="10">200+ 预构建三元组 · knowledge_graph_triples.json · drug_interactions.json</text>
  </g>

  <!-- Performance metrics -->
  <g class="c-green">
    <rect x="30" y="594" width="620" height="48" rx="10" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
    <text class="th" x="340" y="612" text-anchor="middle" fill="#27500A" font-size="12">性能指标</text>
    <text class="ts" x="160" y="632" text-anchor="middle" fill="#3B6D11" font-size="11">三算子管道: 33.5 μs/条</text>
    <text class="ts" x="340" y="632" text-anchor="middle" fill="#3B6D11" font-size="11">吞吐量: 29,648 条/秒</text>
    <text class="ts" x="540" y="632" text-anchor="middle" fill="#3B6D11" font-size="11">15/15 测试通过</text>
  </g>

  <!-- Bottom arrow back to top -->
  <text class="ts" x="340" y="660" text-anchor="middle" fill="#5F5E5A" font-size="11">纯规则引擎 · 零LLM依赖 · 比LLM管线快1000倍以上</text>

  <!-- Legend -->
  <g>
    <rect x="200" y="676" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="218" y="685" fill="#5F5E5A" font-size="10">KG算子</text>
    <rect x="280" y="676" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="298" y="685" fill="#5F5E5A" font-size="10">验证</text>
    <rect x="355" y="676" width="12" height="12" rx="3" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
    <text class="ts" x="373" y="685" fill="#5F5E5A" font-size="10">输出/指标</text>
    <rect x="440" y="676" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="ts" x="458" y="685" fill="#5F5E5A" font-size="10">Schema</text>
  </g>
</svg>
