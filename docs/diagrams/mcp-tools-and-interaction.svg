<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 760" width="100%" role="img">
  <title>MCP 工具全景与交互序列图</title>
  <desc>MCP Server 10+工具分类全景 + Agent-MCP-Operator交互时序</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="th" x="340" y="26" text-anchor="middle" fill="#633806" font-size="15">MCP 工具全景与 Agent 交互序列</text>

  <!-- ===== TOP: Tool Overview ===== -->
  <text class="th" x="340" y="48" text-anchor="middle" fill="#444441" font-size="13">MCP Server v3.0 (FastMCP · SSE · localhost:8089) -- 10+ 工具分类</text>

  <!-- Task 1 tools -->
  <g class="c-amber">
    <rect x="40" y="58" width="195" height="130" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="137" y="76" text-anchor="middle" fill="#633806" font-size="12">Task 1: ETL (4 工具)</text>

    <rect x="55" y="86" width="165" height="22" rx="4" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="137" y="98" text-anchor="middle" fill="#633806" font-size="9">datamate_verify_connection</text>

    <rect x="55" y="114" width="165" height="22" rx="4" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="137" y="126" text-anchor="middle" fill="#633806" font-size="9">datamate_list_operators</text>

    <rect x="55" y="142" width="165" height="22" rx="4" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="137" y="154" text-anchor="middle" fill="#633806" font-size="9">datamate_execute_operator</text>

    <rect x="55" y="170" width="165" height="14" rx="4" fill="#FAC775" stroke="#EF9F27" stroke-width="0.3"/>
    <text class="ts" x="137" y="178" text-anchor="middle" fill="#633806" font-size="8">datamate_run_etl_pipeline</text>
  </g>

  <!-- Task 2 tools -->
  <g class="c-teal">
    <rect x="243" y="58" width="195" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="340" y="76" text-anchor="middle" fill="#085041" font-size="12">Task 2: KG (3 工具)</text>

    <rect x="258" y="92" width="165" height="26" rx="4" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
    <text class="ts" x="340" y="106" text-anchor="middle" fill="#085041" font-size="9">knowledge_graph_search</text>

    <rect x="258" y="124" width="165" height="26" rx="4" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
    <text class="ts" x="340" y="138" text-anchor="middle" fill="#085041" font-size="9">entity_recognition</text>

    <rect x="258" y="156" width="165" height="26" rx="4" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.3"/>
    <text class="ts" x="340" y="170" text-anchor="middle" fill="#085041" font-size="9">relation_extraction</text>
  </g>

  <!-- Task 3 tools -->
  <g class="c-coral">
    <rect x="446" y="58" width="194" height="130" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="543" y="76" text-anchor="middle" fill="#4A1B0C" font-size="12">Task 3: Analysis (3 工具)</text>

    <rect x="461" y="92" width="164" height="26" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="543" y="106" text-anchor="middle" fill="#712B13" font-size="9">kg_analyze</text>

    <rect x="461" y="124" width="164" height="26" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="543" y="138" text-anchor="middle" fill="#712B13" font-size="9">kg_visualize</text>

    <rect x="461" y="156" width="164" height="26" rx="4" fill="#F5C4B3" stroke="#F0997B" stroke-width="0.3"/>
    <text class="ts" x="543" y="170" text-anchor="middle" fill="#712B13" font-size="9">kg_report</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="206" x2="640" y2="206" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="6,4"/>

  <!-- ===== BOTTOM: Interaction Sequence ===== -->
  <text class="th" x="340" y="226" text-anchor="middle" fill="#444441" font-size="13">Agent → MCP → Operator 交互时序</text>

  <!-- Three lanes -->
  <line x1="137" y1="240" x2="137" y2="730" stroke="#534AB7" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="240" x2="340" y2="730" stroke="#BA7517" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="543" y1="240" x2="543" y2="730" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Lane headers -->
  <g class="c-purple">
    <rect x="72" y="244" width="130" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="137" y="259" text-anchor="middle" fill="#26215C" font-size="11">Nexent Agent</text>
  </g>
  <g class="c-amber">
    <rect x="275" y="244" width="130" height="30" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="th" x="340" y="259" text-anchor="middle" fill="#633806" font-size="11">MCP Server</text>
  </g>
  <g class="c-teal">
    <rect x="478" y="244" width="130" height="30" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="543" y="259" text-anchor="middle" fill="#085041" font-size="11">DataMate/算子</text>
  </g>

  <!-- Step 1: Agent sends tool call -->
  <line x1="137" y1="290" x2="340" y2="290" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="180" y="278" width="120" height="20" rx="4" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.3"/>
  <text class="ts" x="240" y="289" text-anchor="middle" fill="#3C3489" font-size="9">1. &lt;RUN&gt; 工具调用</text>

  <!-- Step 2: MCP routes to operator -->
  <line x1="340" y1="320" x2="543" y2="320" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="380" y="308" width="120" height="20" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.3"/>
  <text class="ts" x="440" y="319" text-anchor="middle" fill="#633806" font-size="9">2. 路由到算子</text>

  <!-- Step 3: Operator executes -->
  <g class="c-teal">
    <rect x="478" y="338" width="130" height="32" rx="6" fill="#9FE1CB" stroke="#5DCAA5" stroke-width="0.5"/>
    <text class="ts" x="543" y="354" text-anchor="middle" fill="#085041" font-size="9">3. 算子执行</text>
    <text class="ts" x="543" y="366" text-anchor="middle" fill="#0F6E56" font-size="8">process.py · execute()</text>
  </g>

  <!-- Step 4: Result returns to MCP -->
  <line x1="543" y1="386" x2="340" y2="386" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="380" y="374" width="120" height="20" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.3"/>
  <text class="ts" x="440" y="385" text-anchor="middle" fill="#085041" font-size="9">4. 返回结果JSON</text>

  <!-- Step 5: MCP returns to Agent -->
  <line x1="340" y1="416" x2="137" y2="416" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="180" y="404" width="120" height="20" rx="4" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.3"/>
  <text class="ts" x="240" y="415" text-anchor="middle" fill="#633806" font-size="9">5. SSE 返回结果</text>

  <!-- Step 6: Agent processes -->
  <g class="c-purple">
    <rect x="72" y="434" width="130" height="32" rx="6" fill="#CECBF6" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="ts" x="137" y="450" text-anchor="middle" fill="#3C3489" font-size="9">6. Agent 解析结果</text>
    <text class="ts" x="137" y="462" text-anchor="middle" fill="#534AB7" font-size="8">LLM 推理下一步</text>
  </g>

  <!-- Loop indicator -->
  <path d="M 72 450 Q 50 450 50 420 Q 50 290 72 290" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="30" y="370" fill="#888780" font-size="9" transform="rotate(-90 30 370)">循环直到 max_steps</text>

  <!-- Protocol details -->
  <g class="c-gray">
    <rect x="40" y="486" width="600" height="120" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="340" y="504" text-anchor="middle" fill="#444441" font-size="12">协议细节</text>

    <text class="ts" x="60" y="524" fill="#5F5E5A" font-size="10">通信协议: SSE (Server-Sent Events) · HTTP POST · JSON 格式</text>
    <text class="ts" x="60" y="542" fill="#5F5E5A" font-size="10">工具调用格式: ```&lt;RUN&gt; result = tool_name(params={...}) ```&lt;END_CODE&gt;</text>
    <text class="ts" x="60" y="560" fill="#5F5E5A" font-size="10">参数规范: params 中所有 key 必须双引号 · 布尔值用 True/False (Python格式)</text>
    <text class="ts" x="60" y="578" fill="#5F5E5A" font-size="10">错误处理: 最多重试2次 · 超时直接重试1次 · 全失败则基于通用知识回答</text>
    <text class="ts" x="60" y="596" fill="#5F5E5A" font-size="10">绑定地址: http://host.docker.internal:8089 (Docker容器内访问宿主机)</text>
  </g>

  <!-- Data flow examples -->
  <g class="c-blue">
    <rect x="40" y="620" width="600" height="80" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
    <text class="th" x="340" y="638" text-anchor="middle" fill="#0C447C" font-size="12">数据流示例 (Task 2)</text>

    <text class="ts" x="60" y="658" fill="#0C447C" font-size="10">输入: "糖尿病患者视力模糊"</text>
    <text class="ts" x="60" y="676" fill="#185FA5" font-size="10">→ knowledge_graph_search → [{type:疾病, name:糖尿病}]</text>
    <text class="ts" x="60" y="692" fill="#185FA5" font-size="10">→ entity_recognition → [{head:糖尿病, relation:导致, tail:视力模糊}]</text>
    <text class="ts" x="350" y="676" fill="#185FA5" font-size="10">→ relation_extraction → 三元组+冲突检测</text>
    <text class="ts" x="350" y="692" fill="#185FA5" font-size="10">→ Agent 自查验证 → 综合回答</text>
  </g>

  <!-- Legend -->
  <g>
    <rect x="140" y="718" width="12" height="10" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="ts" x="158" y="726" fill="#5F5E5A" font-size="10">Agent</text>
    <rect x="230" y="718" width="12" height="10" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text class="ts" x="248" y="726" fill="#5F5E5A" font-size="10">MCP</text>
    <rect x="310" y="718" width="12" height="10" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="328" y="726" fill="#5F5E5A" font-size="10">算子</text>
    <line x1="390" y1="723" x2="420" y2="723" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text class="ts" x="430" y="726" fill="#5F5E5A" font-size="10">请求</text>
    <line x1="490" y1="723" x2="520" y2="723" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
    <text class="ts" x="530" y="726" fill="#5F5E5A" font-size="10">响应</text>
  </g>
</svg>
