name: '数据转换算子'
description: '支持字段重命名、字段选择、类型转换、值替换、条件筛选、派生列的数据转换算子'
language: 'python'
vendor: 'ccf-team'
raw_id: 'DataTransformer'
version: '1.0.0'
modal: 'text'
inputs: 'table'
outputs: 'table'
types:
  - 'cleaning'
release:
  - '首次发布'
runtime:
  memory: 20971520
  cpu: 0.2
  gpu: 0
  npu: 0
settings:
  renameFields:
    name: '字段重命名'
    description: 'JSON格式的字段映射（输入为JSON对象），如 {"old_name": "new_name"}'
    type: 'textarea'
    defaultVal: ''
    required: false
  selectFields:
    name: '字段选择'
    description: '保留指定字段（输入为逗号分隔字符串），如 name,age,dept；为空则保留全部'
    type: 'textarea'
    defaultVal: ''
    required: false
  dropFields:
    name: '字段删除'
    description: '删除指定字段（输入为逗号分隔字符串），如 id,temp_col；为空则不删除'
    type: 'textarea'
    defaultVal: ''
    required: false
  typeConversions:
    name: '类型转换'
    description: 'JSON格式的类型映射（输入为JSON对象），如 {"age": "int", "price": "float", "date": "date"}'
    type: 'textarea'
    defaultVal: ''
    required: false
  valueMappings:
    name: '值替换'
    description: 'JSON格式的值映射（输入为JSON嵌套对象），如 {"gender": {"M": "男", "F": "女"}}'
    type: 'textarea'
    defaultVal: ''
    required: false
  filterCondition:
    name: '条件筛选'
    description: 'pandas query 表达式（输入为单行表达式），如 age > 18 或 dept == "内科"；注意：筛选会自动排除 NaN 行'
    type: 'input'
    defaultVal: ''
    required: false
  deriveColumns:
    name: '派生列'
    description: 'JSON格式的派生列定义（输入为JSON对象，值为pandas表达式），如 {"bmi": "weight/(height/100)**2"}'
    type: 'textarea'
    defaultVal: ''
    required: false
